<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyFlow — Courses</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#090b11">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">SF</div>
      <div class="brand-name">StudyFlow</div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
      <a href="courses.html" class="nav-item"><i data-lucide="book-open"></i><span>Courses</span></a>
      <a href="tasks.html" class="nav-item"><i data-lucide="check-square-2"></i><span>Tasks</span></a>
      <a href="plan.html" class="nav-item"><i data-lucide="calendar-days"></i><span>Weekly Plan</span></a>
      <a href="schedule.html" class="nav-item"><i data-lucide="timer"></i><span>Schedule</span></a>
    </nav>
    <div class="sidebar-footer">Your study command center</div>
  </aside>

  <nav class="topbar">
    <div class="brand-mark">SF</div>
    <div class="topbar-links">
      <a href="index.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="tasks.html">Tasks</a>
      <a href="plan.html">Plan</a>
      <a href="schedule.html">Schedule</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Courses</h1>
      <p class="muted">Add courses and set your weekly hours available per course.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Add Course</h2>
        <div class="row">
          <div>
            <label>Course name</label>
            <input id="name" placeholder="e.g., COMP 249" />
          </div>
          <div>
            <label>Weekly hours available</label>
            <input id="hours" type="number" min="1" step="1" value="10" />
          </div>
        </div>
        <div class="row">
          <button class="primary" id="addBtn">
            <i data-lucide="plus"></i> Add Course
          </button>
          <div class="small" id="msg"></div>
        </div>
      </div>

      <div class="card">
        <h2>All Courses</h2>
        <div class="list" id="list">
          <div class="small" style="padding: 8px 0;">Loading courses…</div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/courses.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
